<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShieldAI Pro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🛡️ ShieldAI Pro</h1>
  <p>Analyse de sécurité intelligente</p>
</header>

<nav>
  <button onclick="showTab('linkTab')">🔗 Lien</button>
  <button onclick="showTab('phoneTab')">📞 Numéro</button>
  <button onclick="showTab('msgTab')">💬 Message</button>
</nav>

<main>

  <!-- LIEN -->
  <section id="linkTab" class="tab active">
    <h2>Analyse de lien</h2>
    <input id="linkInput" placeholder="Colle un lien ici">
    <button onclick="analyzeLink()">Analyser</button>
  </section>

  <!-- PHONE -->
  <section id="phoneTab" class="tab">
    <h2>Analyse de numéro</h2>
    <input id="phoneInput" placeholder="Ex: +229XXXXXXXX">
    <button onclick="analyzePhone()">Analyser</button>
  </section>

  <!-- MESSAGE -->
  <section id="msgTab" class="tab">
    <h2>Analyse de message</h2>
    <textarea id="msgInput" placeholder="Colle un message suspect"></textarea>
    <button onclick="analyzeMessage()">Analyser</button>
  </section>

  <hr>

  <section class="result-box">
    <h2 id="result">Résultat</h2>
    <pre id="details"></pre>
  </section>

</main>

<script src="app.js"></script>

</body>
</html>
